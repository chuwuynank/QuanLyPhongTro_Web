<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập & Đăng Ký - EasyRoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 100%; max-width: 500px; background: #fff; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .auth-header { background: #1a202c; padding: 30px; text-align: center; }
        .nav-pills .nav-link { color: #6c757d; font-weight: 600; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h3><a href="trang-chu.html" style="color: #ffca28; text-decoration: none;"><i class="fa-solid fa-house-chimney-window"></i> EasyRoom</a></h3>
        </div>
        <div class="p-4">
            <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">ĐĂNG NHẬP</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#pills-reg" type="button">ĐĂNG KÝ</button>
                </li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="pills-login">
                    <form action="LoginServlet" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tài khoản</label>
                            <input type="text" name="tai_khoan" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" name="mat_khau" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">VÀO HỆ THỐNG</button>
                    </form>
                </div>
                <div class="tab-pane fade" id="pills-reg">
                    <form action="RegisterServlet" method="POST" class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">Họ tên</label>
                            <input type="text" name="ho_ten" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" name="sdt" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Vai trò</label>
                            <select name="ma_vaitro" class="form-select">
                                <option value="3">Người thuê</option>
                                <option value="2">Chủ trọ</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Tài khoản</label>
                            <input type="text" name="tai_khoan" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" name="mat_khau" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold mt-4 py-2">TẠO TÀI KHOẢN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
