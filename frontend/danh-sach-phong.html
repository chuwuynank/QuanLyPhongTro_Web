<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết Quả Tìm Kiếm - EasyRoom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #1a202c !important; }
        .room-card { transition: 0.3s; border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .room-card:hover { transform: scale(1.01); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .price-text { color: #dc3545; font-weight: 800; font-size: 1.4rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="trang-chu.html"><i class="fa-solid fa-house-chimney-window"></i> EasyRoom</a>
        </div>
    </nav>

    <div class="container my-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="trang-chu.html">Trang chủ</a></li>
                <li class="breadcrumb-item active">Kết quả tìm kiếm</li>
            </ol>
        </nav>
        
        <h3 class="fw-bold mb-4">Kết Quả Lọc: <span class="text-primary">[SỐ_LƯỢNG] phòng tìm thấy</span></h3>
        
        <div class="row g-4">
            <div class="col-12">
                <div class="card room-card flex-md-row overflow-hidden">
                    <img src="https://placehold.co/400x300?text=[Anh_Chinh]" style="width: 320px; object-fit: cover;" class="d-none d-md-block">
                    <div class="card-body p-4 position-relative w-100">
                        <span class="badge bg-success position-absolute top-0 end-0 m-3">[TRẠNG_THÁI]</span>
                        <h4 class="card-title fw-bold mb-3">[TIÊU_ĐỀ_PHÒNG_TRỌ]</h4>
                        <p class="text-muted mb-2"><i class="fa-solid fa-location-dot"></i> [ĐỊA_CHỈ_CHI_TIẾT]</p>
                        <div class="mb-3">
                            <span class="me-3"><i class="fa-solid fa-building text-primary"></i> [LOẠI_PHÒNG]</span>
                            <span><i class="fa-solid fa-ruler-combined text-primary"></i> [DIỆN_TÍCH] m²</span>
                        </div>
                        <div class="d-flex justify-content-between align-items-end">
                            <div>
                                <small class="text-muted d-block">Giá thuê hàng tháng</small>
                                <span class="price-text">[GIÁ_THUÊ] VNĐ</span>
                            </div>
                            <a href="ChiTietServlet?id=[ID]" class="btn btn-primary fw-bold px-4">XEM CHI TIẾT</a>
                        </div>
                    </div>
                </div>
            </div>
            </div>
    </div>
</body>
</html>
